<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; }
        #sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; }
        #sidebar ul { list-style: none; padding: 0; }
        #sidebar li { padding: 10px; cursor: pointer; }
        #sidebar li.active, #sidebar li:hover { background: #1abc9c; }
        #content { flex: 1; padding: 20px; }
        .section { display: none; }
        .section.active-section { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        button { background: #3498db; color: white; border: none; padding: 8px 15px; cursor: pointer; margin: 5px; }
        button:hover { opacity: 0.8; }
        .error { color: red; background: #ffe6e6; padding: 10px; margin: 10px 0; }
        .success { color: green; background: #e6ffe6; padding: 10px; margin: 10px 0; }
        textarea { width: 100%; height: 300px; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Administrador</h3>
        <ul>
            <li data-section="cursos" class="active">📚 Cursos</li>
            <li data-section="tutores">👨‍🏫 Tutores</li>
            <li data-section="estudiantes">🎓 Estudiantes</li>
            <li data-section="upload">📤 Cargar XML</li>
            <li data-section="editar">✏️ Editar XML</li>
            <li><a href="/logout" style="color:white; text-decoration:none;">🚪 Cerrar sesión</a></li>
        </ul>
    </div>
    <div id="content">
        <!-- Sección Cursos -->
        <div id="cursos" class="section active-section">
            <h2>Gestión de Cursos</h2>
            <button id="btnCargarCursos">🔄 Cargar Cursos</button>
            <div id="cursosLista">Cargando...</div>
        </div>

        <!-- Sección Tutores -->
        <div id="tutores" class="section">
            <h2>Tutores</h2>
            <button id="btnCargarTutores">🔄 Cargar Tutores</button>
            <div id="tutoresLista">Cargando...</div>
        </div>

        <!-- Sección Estudiantes -->
        <div id="estudiantes" class="section">
            <h2>Estudiantes</h2>
            <button id="btnCargarEstudiantes">🔄 Cargar Estudiantes</button>
            <div id="estudiantesLista">Cargando...</div>
        </div>

        <!-- Sección Cargar XML -->
        <div id="upload" class="section">
            <h2>Cargar Archivo XML</h2>
            <input type="file" id="fileXml" accept=".xml">
            <button id="btnSubirXml">Subir Archivo</button>
            <button id="btnProcesarXml">⚙️ Procesar (generar salida)</button>
            <button id="btnLimpiarXml">🗑️ Limpiar Datos</button>
            <div id="mensajeXml"></div>
            <div id="salidaXmlContainer" style="display:none;">
                <h3>XML de Salida</h3>
                <textarea id="salidaXml" rows="10" readonly></textarea>
                <button id="btnCopiarXml">📋 Copiar</button>
                <button id="btnDescargarXml">💾 Descargar</button>
            </div>
        </div>

        <!-- Sección Editar XML -->
        <div id="editar" class="section">
            <h2>Editar XML Cargado</h2>
            <button id="btnCargarXmlEditar">📂 Cargar XML actual</button>
            <textarea id="xmlEditor" rows="15" style="display:none;"></textarea>
            <button id="btnGuardarXml" style="display:none;">💾 Guardar Cambios</button>
            <div id="mensajeEditor"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ---------- Menú ----------
            const sections = document.querySelectorAll('.section');
            const menuItems = document.querySelectorAll('#sidebar li[data-section]');
            menuItems.forEach(item => {
                item.addEventListener('click', () => {
                    const sectionId = item.getAttribute('data-section');
                    sections.forEach(sec => sec.classList.remove('active-section'));
                    document.getElementById(sectionId).classList.add('active-section');
                    menuItems.forEach(li => li.classList.remove('active'));
                    item.classList.add('active');
                });
            });

            // Utilidad mensajes
            function mostrarMensaje(divId, msg, isError = false) {
                const div = document.getElementById(divId);
                if (div) {
                    div.innerHTML = `<div class="${isError ? 'error' : 'success'}">${msg}</div>`;
                    setTimeout(() => div.innerHTML = '', 5000);
                }
            }

            // ========== CURSOS ==========
            async function cargarCursos() {
                const container = document.getElementById('cursosLista');
                container.innerHTML = 'Cargando...';
                try {
                    const res = await fetch('/api/admin/cursos');
                    if (!res.ok) throw new Error('Error en la petición');
                    const cursos = await res.json();
                    if (!cursos.length) {
                        container.innerHTML = '<div class="error">No hay cursos. Sube un XML primero.</div>';
                        return;
                    }
                    let html = '<table><thead><tr><th>Código</th><th>Nombre</th></tr></thead><tbody>';
                    cursos.forEach(c => html += `<tr><td>${c.codigo}</td><td>${c.nombre}</td></tr>`);
                    html += '</tbody> nahil';
                    container.innerHTML = html;
                } catch (err) {
                    container.innerHTML = '<div class="error">Error al cargar cursos. ¿Backend activo?</div>';
                }
            }
            document.getElementById('btnCargarCursos').addEventListener('click', cargarCursos);
            cargarCursos();

            // ========== TUTORES ==========
            async function cargarTutores() {
                const container = document.getElementById('tutoresLista');
                container.innerHTML = 'Cargando...';
                try {
                    const res = await fetch('/api/admin/tutores');
                    const tutores = await res.json();
                    if (!tutores.length) {
                        container.innerHTML = '<div class="error">No hay tutores.</div>';
                        return;
                    }
                    let html = '<table><thead><tr><th>Registro</th><th>Nombre</th><th>Contraseña</th><th>Cursos</th></tr></thead><tbody>';
                    tutores.forEach(t => {
                        html += `<tr><td>${t.registro}</td><td>${t.nombre}</td><td>${t.contrasenia}</td><td>${t.cursos.join(', ') || 'Ninguno'}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } catch (err) {
                    container.innerHTML = '<div class="error">Error al cargar tutores.</div>';
                }
            }
            document.getElementById('btnCargarTutores').addEventListener('click', cargarTutores);

            // ========== ESTUDIANTES ==========
            async function cargarEstudiantes() {
                const container = document.getElementById('estudiantesLista');
                container.innerHTML = 'Cargando...';
                try {
                    const res = await fetch('/api/admin/estudiantes');
                    const estudiantes = await res.json();
                    if (!estudiantes.length) {
                        container.innerHTML = '<div class="error">No hay estudiantes.</div>';
                        return;
                    }
                    let html = '<table><thead><tr><th>Carnet</th><th>Nombre</th><th>Contraseña</th><th>Cursos</th></tr></thead><tbody>';
                    estudiantes.forEach(e => {
                        html += `<tr><td>${e.carnet}</td><td>${e.nombre}</td><td>${e.contrasenia}</td><td>${e.cursos.join(', ') || 'Ninguno'}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } catch (err) {
                    container.innerHTML = '<div class="error">Error al cargar estudiantes.</div>';
                }
            }
            document.getElementById('btnCargarEstudiantes').addEventListener('click', cargarEstudiantes);

            // ========== SUBIR XML ==========
            document.getElementById('btnSubirXml').addEventListener('click', async () => {
                const file = document.getElementById('fileXml').files[0];
                if (!file) return mostrarMensaje('mensajeXml', 'Selecciona un archivo XML', true);
                const fd = new FormData();
                fd.append('archivo', file);
                mostrarMensaje('mensajeXml', 'Subiendo...');
                try {
                    const res = await fetch('/api/admin/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.success) {
                        mostrarMensaje('mensajeXml', '✅ Archivo cargado');
                        cargarCursos(); cargarTutores(); cargarEstudiantes();
                    } else mostrarMensaje('mensajeXml', data.error, true);
                } catch (err) { mostrarMensaje('mensajeXml', 'Error de conexión', true); }
            });

            // ========== PROCESAR (XML de salida) ==========
            const salidaContainer = document.getElementById('salidaXmlContainer');
            const salidaTextarea = document.getElementById('salidaXml');
            document.getElementById('btnProcesarXml').addEventListener('click', async () => {
                salidaContainer.style.display = 'none';
                mostrarMensaje('mensajeXml', 'Procesando...');
                try {
                    const res = await fetch('/api/admin/procesar');
                    const data = await res.json();
                    if (data.success && data.salida_xml) {
                        salidaTextarea.value = data.salida_xml;
                        salidaContainer.style.display = 'block';
                        mostrarMensaje('mensajeXml', '✅ XML de salida generado');
                    } else mostrarMensaje('mensajeXml', data.error || 'Error al procesar', true);
                } catch (err) { mostrarMensaje('mensajeXml', 'Error de conexión', true); }
            });

            // Copiar y descargar
            document.getElementById('btnCopiarXml').addEventListener('click', () => {
                salidaTextarea.select(); document.execCommand('copy');
                mostrarMensaje('mensajeXml', 'Copiado al portapapeles');
            });
            document.getElementById('btnDescargarXml').addEventListener('click', () => {
                const blob = new Blob([salidaTextarea.value], { type: 'application/xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'salida_configuraciones.xml'; a.click();
                URL.revokeObjectURL(url);
            });

            // ========== LIMPIAR XML ==========
            document.getElementById('btnLimpiarXml').addEventListener('click', async () => {
                if (!confirm('¿Eliminar todos los datos?')) return;
                try {
                    const res = await fetch('/api/admin/limpiar', { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        mostrarMensaje('mensajeXml', 'Datos eliminados');
                        document.getElementById('cursosLista').innerHTML = '<div class="error">No hay datos</div>';
                        document.getElementById('tutoresLista').innerHTML = '<div class="error">No hay datos</div>';
                        document.getElementById('estudiantesLista').innerHTML = '<div class="error">No hay datos</div>';
                        salidaContainer.style.display = 'none';
                    } else mostrarMensaje('mensajeXml', data.error, true);
                } catch (err) { mostrarMensaje('mensajeXml', 'Error de conexión', true); }
            });

            // ========== EDITAR XML ==========
            const editor = document.getElementById('xmlEditor');
            const btnGuardar = document.getElementById('btnGuardarXml');
            document.getElementById('btnCargarXmlEditar').addEventListener('click', async () => {
                editor.style.display = 'block';
                editor.value = 'Cargando...';
                btnGuardar.style.display = 'none';
                try {
                    const res = await fetch('/api/admin/xml');
                    const data = await res.json();
                    if (data.success && data.contenido) {
                        editor.value = data.contenido;
                        btnGuardar.style.display = 'inline-block';
                        mostrarMensaje('mensajeEditor', 'XML cargado para edición');
                    } else {
                        editor.value = 'No hay archivo XML cargado.';
                        mostrarMensaje('mensajeEditor', data.error, true);
                    }
                } catch (err) {
                    editor.value = 'Error de conexión';
                    mostrarMensaje('mensajeEditor', 'Error de conexión', true);
                }
            });
            btnGuardar.addEventListener('click', async () => {
                const contenido = editor.value;
                if (!contenido) return;
                try {
                    const res = await fetch('/api/admin/xml', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contenido })
                    });
                    const data = await res.json();
                    if (data.success) {
                        mostrarMensaje('mensajeEditor', '✅ Guardado correctamente');
                        cargarCursos(); cargarTutores(); cargarEstudiantes();
                    } else mostrarMensaje('mensajeEditor', data.error, true);
                } catch (err) { mostrarMensaje('mensajeEditor', 'Error de conexión', true); }
            });
        });
    </script>
</body>
</html>
