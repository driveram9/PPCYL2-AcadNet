<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios registrados</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Usuarios registrados</h1>

    <table>
        <thead>
            <tr>
                <th>Carnet</th>
                <th>Contraseña</th>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody>
            {% for estudiante in estudiantes %}
            <tr>
                <td>{{ estudiante.carnet }}</td>
                <td>{{ estudiante.contrasenia }}</td>
                <td>{{ estudiante.nombre }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('admin.admin_dashboard') }}">⬅️ Volver al Dashboard</a>
</body>
</html>
